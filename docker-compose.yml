version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: distribution-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: flowpay_db
      MYSQL_USER: flowpay_user
      MYSQL_PASSWORD: flowpay_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - distribution-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distribution-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/flowpay_db?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: flowpay_user
      SPRING_DATASOURCE_PASSWORD: flowpay_pass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - distribution-network

volumes:
  db_data:

networks:
  distribution-network:
    driver: bridge
