spring.application.name=distribution-service

# Configurações do Banco (lê variáveis de ambiente; fallback para desenvolvimento local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/flowpay_db?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:flowpay_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flowpay_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect